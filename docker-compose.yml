services:
  db:
    image: postgres:16-alpine
    container_name: fashbalance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - fashbalance_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fashbalance_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ECOMMERCE_API_KEY: ${ECOMMERCE_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - fashbalance_fotos_data:/app/fotos_productos

  frontend:
    build: ./frontend
    container_name: fashbalance_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src

  ecommerce:
    build: ./ecommerce
    container_name: fashbalance_ecommerce
    restart: unless-stopped
    environment:
      FASHBALANCE_API_URL: http://backend:8000
      FASHBALANCE_PUBLIC_URL: ${FASHBALANCE_PUBLIC_URL}
      ECOMMERCE_API_KEY: ${ECOMMERCE_API_KEY}
      WHATSAPP_NUMERO: ${WHATSAPP_NUMERO}
      INSTAGRAM_URL: ${INSTAGRAM_URL}
      FACEBOOK_URL: ${FACEBOOK_URL}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  fashbalance_db_data:
  fashbalance_fotos_data:
